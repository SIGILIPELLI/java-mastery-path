site_name: Java Mastery Path
site_description: A structured, module-wise Java training program from entry level to master level.
site_url: https://sigilipelli.github.io/java-mastery-path/
repo_url: https://github.com/SIGILIPELLI/java-mastery-path
repo_name: java-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Program": level-1/01-setup.md
      - "02 · Variables, Data Types & Operators": level-1/02-variables-data-types.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Methods & Parameters": level-1/04-methods-parameters.md
      - "05 · Arrays & Basic Collections": level-1/05-arrays-collections.md
      - "06 · Strings & String Formatting": level-1/06-strings-formatting.md
      - "07 · Classes & Objects Basics": level-1/07-classes-objects.md
      - "08 · Exception Handling Basics": level-1/08-exception-handling.md
      - "09 · Packages & Build Tools Intro": level-1/09-packages-build-tools.md
      - "10 · Project — CLI Contact Book": level-1/10-project-contact-book.md
  - "Level 2 · Intermediate":
